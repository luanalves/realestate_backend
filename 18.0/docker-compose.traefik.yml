# =============================================================================
# docker-compose.traefik.yml — Traefik overlay (non-local environments)
# =============================================================================
# Use this file in production, staging, and dev server environments.
# Local development keeps direct port bindings from docker-compose.yml.
#
# USAGE:
#   docker compose -f docker-compose.yml -f docker-compose.traefik.yml up -d
#
# DOKPLOY:
#   Set "Compose Path" to both files separated by colon:
#     18.0/docker-compose.yml:18.0/docker-compose.traefik.yml
#   Or set in Dokploy environment variables:
#     COMPOSE_FILE=docker-compose.yml:docker-compose.traefik.yml
#
# REQUIRED ENV VARS (add to .env / Dokploy environment):
#   ODOO_DOMAIN     — main Odoo UI      e.g. torque-backoffice.thedevkitchen.com.br
#   FLOWER_DOMAIN   — Celery monitoring e.g. flower.torque-backoffice.thedevkitchen.com.br
#   MAILHOG_DOMAIN  — Email testing UI  e.g. mail.torque-backoffice.thedevkitchen.com.br
#   RABBITMQ_DOMAIN — Queue management  e.g. rabbitmq.torque-backoffice.thedevkitchen.com.br
#
# WHAT THIS FILE DOES:
#   1. Removes all direct host port bindings (db, redis, rabbitmq, odoo, flower, mailhog)
#      so infrastructure ports are NOT accessible from the internet.
#   2. Adds Traefik routing labels for internet-facing services with HTTPS + Let's Encrypt.
#   3. Attaches internet-facing services to dokploy-network so Traefik can reach them.
#
# NOTE: Requires Docker Compose >= 2.22 for the `!reset` merge tag.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Infrastructure: remove direct host port exposure
  # ---------------------------------------------------------------------------
  db:
    ports: !reset []

  redis:
    ports: !reset []

  # ---------------------------------------------------------------------------
  # Odoo: route via subdomain instead of :8069 / :8072
  # Longpolling (/longpolling path) is routed to port 8072 (workers mode).
  # ---------------------------------------------------------------------------
  odoo:
    ports: !reset []
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # HTTPS — main application
      - "traefik.http.routers.odoo.rule=Host(`${ODOO_DOMAIN}`)"
      - "traefik.http.routers.odoo.entrypoints=websecure"
      - "traefik.http.routers.odoo.tls=true"
      - "traefik.http.routers.odoo.tls.certresolver=letsencrypt"
      - "traefik.http.routers.odoo.priority=1"
      - "traefik.http.services.odoo.loadbalancer.server.port=8069"
      # HTTPS — longpolling (websocket, has higher priority)
      - "traefik.http.routers.odoo-lp.rule=Host(`${ODOO_DOMAIN}`) && PathPrefix(`/longpolling`)"
      - "traefik.http.routers.odoo-lp.entrypoints=websecure"
      - "traefik.http.routers.odoo-lp.tls=true"
      - "traefik.http.routers.odoo-lp.tls.certresolver=letsencrypt"
      - "traefik.http.routers.odoo-lp.priority=10"
      - "traefik.http.services.odoo-lp.loadbalancer.server.port=8072"
    networks:
      - dokploy-network

  # ---------------------------------------------------------------------------
  # RabbitMQ: expose only the management UI (15672), not the AMQP port (5672)
  # ---------------------------------------------------------------------------
  rabbitmq:
    ports: !reset []
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.rabbitmq.rule=Host(`${RABBITMQ_DOMAIN}`)"
      - "traefik.http.routers.rabbitmq.entrypoints=websecure"
      - "traefik.http.routers.rabbitmq.tls=true"
      - "traefik.http.routers.rabbitmq.tls.certresolver=letsencrypt"
      - "traefik.http.services.rabbitmq.loadbalancer.server.port=15672"
    networks:
      - dokploy-network

  # ---------------------------------------------------------------------------
  # Flower: Celery monitoring dashboard
  # ---------------------------------------------------------------------------
  flower:
    ports: !reset []
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.flower.rule=Host(`${FLOWER_DOMAIN}`)"
      - "traefik.http.routers.flower.entrypoints=websecure"
      - "traefik.http.routers.flower.tls=true"
      - "traefik.http.routers.flower.tls.certresolver=letsencrypt"
      - "traefik.http.services.flower.loadbalancer.server.port=5555"
    networks:
      - dokploy-network

  # ---------------------------------------------------------------------------
  # Mailhog: email testing UI
  # ---------------------------------------------------------------------------
  mailhog:
    ports: !reset []
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.mailhog.rule=Host(`${MAILHOG_DOMAIN}`)"
      - "traefik.http.routers.mailhog.entrypoints=websecure"
      - "traefik.http.routers.mailhog.tls=true"
      - "traefik.http.routers.mailhog.tls.certresolver=letsencrypt"
      - "traefik.http.services.mailhog.loadbalancer.server.port=8025"
    networks:
      - dokploy-network

# dokploy-network is the external Traefik network managed by Dokploy.
# Services attached to it become reachable by the Traefik reverse proxy.
networks:
  dokploy-network:
    external: true
