# -----------------------------------------------------------------------------
# Autovacuum Status (importante para Odoo)
# -----------------------------------------------------------------------------
pg_stat_progress_vacuum:
  query: |
    SELECT 
      datname as database,
      relid::regclass::text as table_name,
      phase,
      heap_blks_total,
      heap_blks_scanned,
      heap_blks_vacuumed,
      index_vacuum_count,
      max_dead_tuples,
      num_dead_tuples
    FROM pg_stat_progress_vacuum
  metrics:
    - database:
        usage: "LABEL"
        description: "Nome do database"
    - table_name:
        usage: "LABEL"
        description: "Nome da tabela sendo vacuumizada"
    - phase:
        usage: "LABEL"
        description: "Fase do vacuum"
    - heap_blks_total:
        usage: "GAUGE"
        description: "Total de blocos da heap"
    - heap_blks_scanned:
        usage: "GAUGE"
        description: "Blocos scanned"
    - heap_blks_vacuumed:
        usage: "GAUGE"
        description: "Blocos vacuumizados"
    - index_vacuum_count:
        usage: "GAUGE"
        description: "Número de vezes que índices foram vacuum"
    - max_dead_tuples:
        usage: "GAUGE"
        description: "Máximo de tuplas mortas"
    - num_dead_tuples:
        usage: "GAUGE"
        description: "Número atual de tuplas mortas"
