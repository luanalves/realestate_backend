openapi: "3.0.3"
info:
  title: Goals API – Update Goal
  version: "1.0.0"
  description: |
    Updates an existing monthly performance goal.
    Only the goal owner's company scope is accessible.
    Requires triple auth: JWT + session + company scope.

paths:
  /api/v1/goals/{id}:
    put:
      summary: Update a monthly goal
      operationId: updateGoal
      tags:
        - Goals
      security:
        - BearerAuth: []
        - SessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: Goal record ID
          example: 42
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGoalRequest'
            example:
              target: 12
              target_vgv: 600000.00
              notes: "Atualizado após revisão"
      responses:
        "200":
          description: Goal updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoalResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    SessionCookie:
      type: apiKey
      in: cookie
      name: session_id

  schemas:
    UpdateGoalRequest:
      type: object
      description: |
        All fields are optional. Only provided fields are updated.
        Identity fields (user_id, year, month, metric_type, operation_type) cannot be changed
        — delete and recreate if those need to change.
      properties:
        target:
          type: number
          format: float
          exclusiveMinimum: 0
          description: New goal quantity target (must be > 0)
          example: 12.0
        target_vgv:
          type: number
          format: float
          minimum: 0
          nullable: true
          description: |
            New VGV target in BRL.
            Applicable only for metric_type: captacao, propostas, fechamento.
            Pass null to clear.
          example: 600000.00
        notes:
          type: string
          nullable: true
          maxLength: 1000
          description: Optional free-text annotation. Pass null to clear.
          example: "Atualizado após revisão"

    GoalResponse:
      type: object
      properties:
        id:
          type: integer
          example: 42
        user_id:
          type: integer
          example: 5
        user_name:
          type: string
          example: "Ana Costa"
        company_id:
          type: integer
          example: 1
        year:
          type: integer
          example: 2025
        month:
          type: integer
          example: 3
        metric_type:
          type: string
          example: captacao
        operation_type:
          type: string
          example: sale
        target:
          type: number
          example: 12.0
        target_vgv:
          type: number
          nullable: true
          example: 600000.00
        notes:
          type: string
          nullable: true
          example: "Atualizado após revisão"
        active:
          type: boolean
          example: true
        create_date:
          type: string
          format: date-time
          example: "2025-03-01T09:00:00Z"
        write_date:
          type: string
          format: date-time
          example: "2025-03-15T14:30:00Z"

    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

  responses:
    BadRequest:
      description: Bad Request – invalid parameter values
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Unauthorized – missing or invalid JWT / session
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Forbidden – caller lacks permission or goal belongs to another company
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Not Found – goal with this ID does not exist or is inactive
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Not Found"
            message: "Goal not found"
    UnprocessableEntity:
      description: Unprocessable Entity – business rule violation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
